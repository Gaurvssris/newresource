trigger:
- main

pool:
  name: dockeragent

steps:

- checkout: self

- task: PowerShell@2
  displayName: 'Show Files'
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "Source Directory = $(Build.SourcesDirectory)"
      Get-ChildItem "$(Build.SourcesDirectory)" -Recurse

- task: TerraformInstaller@1
  displayName: 'Install Terraform'
  inputs:
    terraformVersion: '1.10.5'

- task: TerraformTask@5
  displayName: 'Terraform Init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    workingDirectory: '$(Build.SourcesDirectory)\resource\newresource'
    backendServiceArm: 'automation'
    backendAzureRmStorageAccountName: 'gauravbackupstorage'
    backendAzureRmContainerName: 'tfstate'
    backendAzureRmKey: 'backup.tfstate'

